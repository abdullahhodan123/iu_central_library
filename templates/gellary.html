{% extends 'base.html' %}
{% load static %}

{% block body %}
<style>
  .gallery img {
    width: 150px;
    margin: 10px;
    cursor: pointer;
    transition: 0.3s;
  }

  .gallery a {
    text-decoration: none;
  }

  .lightbox {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    text-align: center;
    padding-top: 60px;
  }

  .lightbox img {
    max-width: 90%;
    max-height: 80%;
  }

  .lightbox:target {
    display: block;
  }

  .close {
    position: absolute;
    top: 20px;
    right: 40px;
    color: white;
    font-size: 30px;
    text-decoration: none;
  }
</style>
